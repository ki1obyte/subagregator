name: Check Proxies Availability

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download proxy list
        run: curl -o proxies_to_check.txt https://raw.githubusercontent.com/F0rc3Run/F0rc3Run/refs/heads/main/Best-Results/proxies.txt

      # --- ФИНАЛЬНЫЙ, ПРОВЕРЕННЫЙ ШАГ УСТАНОВКИ ---
      - name: Install latest Xray-core
        run: |
          # Скачиваем официальный скрипт установки
          bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install --beta
          # Скрипт устанавливает xray в /usr/local/bin/xray, теперь он доступен глобально

      # --- ФИНАЛЬНЫЙ, ПРОВЕРЕННЫЙ ШАГ ПРОВЕРКИ ---
      - name: Check proxies and save working ones
        # Используем глобально установленный xray с правильной командой `sub`
        run: |
          head -n 100 proxies_to_check.txt | xray sub -o public/checked-proxies.txt
        continue-on-error: true

      - name: Check if result file exists
        id: check_file
        run: |
          if [ -s public/checked-proxies.txt ]; then
            echo "file_exists=true" >> $GITHUB_OUTPUT
          else
            echo "No working proxies found. Skipping commit."
            echo "file_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push checked proxies
        if: steps.check_file.outputs.file_exists == 'true'
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Автоматическое обновление проверенных прокси"
          file_pattern: "public/checked-proxies.txt"

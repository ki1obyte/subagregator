name: Update Subscription Data

on:
  schedule:
    # Запускать каждый день в 5 утра по UTC (8 утра по МСК)
    # Вы можете поменять время. '0 5 * * *' - это cron-синтаксис.
    - cron: '0 5 * * *'
  workflow_dispatch:
    # Эта строка позволяет запускать действие вручную с вкладки Actions

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      # 1. Скачиваем код из репозитория
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Устанавливаем Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Устанавливаем зависимости (axios)
      - name: Install dependencies
        run: npm install

      # 4. Запускаем наш скрипт обновления
      - name: Run update script
        run: node update-script.js

      # 5. Сохраняем изменения (новый data.json) в репозиторий
      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Автоматическое обновление данных о подписках"
          file_pattern: "data.json" # Отслеживать изменения только в этом файле

name: Check VLESS Proxies

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Скачивание репозитория
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      # Шаг 2: Настройка Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      # --- НОВЫЙ ШАГ: Кэширование V2Ray ---
      # Этот шаг будет искать v2ray в кэше и восстанавливать его, если он был сохранен ранее.
      - name: Cache V2Ray binary
        id: cache-v2ray
        uses: actions/cache@v4
        with:
          # Указываем, какой файл или папку нужно кэшировать
          path: v2ray
          # Создаем уникальный ключ для кэша. Если ключ совпадает, кэш восстанавливается.
          key: ${{ runner.os }}-v2ray-v5.15.0 # Рекомендуется добавлять версию, чтобы кэш обновлялся при смене версии v2ray

      # Шаг 3: Установка зависимостей
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y unzip
          pip install requests PySocks

      # Шаг 4: Запуск скрипта проверки
      # Теперь скрипт будет находить v2ray в кэше (если он есть) и не будет его скачивать
      - name: Run proxy check
        run: python check_proxies.py

      # Шаг 5: Коммит и отправка изменений
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main
          git add working_vless.txt
          if git diff --staged --quiet; then
            echo "No changes to commit in working_vless.txt"
          else
            git commit -m "Updated working VLESS proxies: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

name: Check VLESS Proxies (Parallel, REALITY-only, by Country)

on:
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch:

jobs:
  # ЗАДАНИЕ 1: ПОДГОТОВКА И ФИЛЬТРАЦИЯ
  prepare:
    runs-on: ubuntu-latest
    outputs:
      job_matrix: ${{ steps.split.outputs.job_matrix }}
    steps:
      - name: Fetch, Filter, and Split Proxies
        id: split
        run: |
          curl -s https://raw.githubusercontent.com/F0rc3Run/F0rc3Run/refs/heads/main/splitted-by-protocol/vless.txt -o all_proxies.txt
          grep -E 'pbk=[^&]+|security=reality' all_proxies.txt > reality_proxies.txt || true
          
          NUM_JOBS=15
          sed -i '/^$/d' reality_proxies.txt
          split -d -n l/$NUM_JOBS reality_proxies.txt proxies_
          
          for i in $(seq 0 $((NUM_JOBS - 1))); do
            if [ -f "proxies_$(printf "%02d" $i)" ]; then
              mv "proxies_$(printf "%02d" $i)" "proxies_$i.txt"
            fi
          done
          
          JOB_MATRIX=$(jq -nc '[range(0; $num)]' --argjson num $NUM_JOBS)
          echo "job_matrix=$JOB_MATRIX" >> $GITHUB_OUTPUT

      - name: Upload proxy chunks
        uses: actions/upload-artifact@v4
        with:
          name: proxy-chunks
          path: proxies_*.txt

  # ЗАДАНИЕ 2: ПАРАЛЛЕЛЬНАЯ ПРОВЕРКА (без изменений)
  check:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        job_index: ${{ fromJson(needs.prepare.outputs.job_matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Get latest Xray version
        id: get_xray_version
        run: echo "XRAY_VERSION=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r .tag_name)" >> $GITHUB_ENV
      - name: Cache Xray binary
        id: cache-xray
        uses: actions/cache@v4
        with:
          path: xray
          key: ${{ runner.os }}-xray-core-${{ env.XRAY_VERSION }}
      - name: Install dependencies
        run: pip install requests
      - name: Download specific proxy chunk
        uses: actions/download-artifact@v4
        with:
          name: proxy-chunks
      
      - name: Run proxy check on chunk
        run: |
          mkdir -p results_dir_${{ matrix.job_index }}
          python check_proxies.py proxies_${{ matrix.job_index }}.txt results_dir_${{ matrix.job_index }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-batch-${{ matrix.job_index }}
          path: results_dir_${{ matrix.job_index }}/

  # ЗАДАНИЕ 3: СБОРКА РЕЗУЛЬТАТОВ (с исправлением)
  collect:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Download all result batches
        uses: actions/download-artifact@v4
        with:
          pattern: results-batch-*
          path: temp_results/

      - name: Combine and Push Results
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -e
          
          echo "Cloning target repository..."
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/ki1obyte/325234657545.git target_repo
          
          TARGET_DIR="target_repo/splitted-by-country-reality"
          echo "Preparing target directory: $TARGET_DIR"
          mkdir -p "$TARGET_DIR"
          rm -rf "$TARGET_DIR"/*
          
          echo "Aggregating results by country..."
          find temp_results -type f -name "*.txt" | while read -r file; do
            filename=$(basename "$file")
            cat "$file" >> "$TARGET_DIR/$filename"
          done
          
          # --- ИСПРАВЛЕНИЕ ЗДЕСЬ: Финальная умная дедупликация ---
          echo "Deduplicating aggregated files, ignoring remarks..."
          find "$TARGET_DIR" -type f -name "*.txt" -print0 | while IFS= read -r -d '' file; do
            # Используем sort с разделителем '#' для удаления дубликатов по основной части URL
            sort -t'#' -k1,1 -u "$file" -o "$file"
            # Удаляем пустые строки, которые могли остаться
            sed -i '/^$/d' "$file"
          done
          
          echo "Creating combined test.txt file..."
          rm -f target_repo/test.txt
          cat "$TARGET_DIR"/*.txt > target_repo/test.txt || true
          
          TOTAL_PROXIES=$(wc -l < target_repo/test.txt)
          echo "Total unique working REALITY proxies found: $TOTAL_PROXIES"
          
          cd target_repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add splitted-by-country-reality/ test.txt
          
          if git diff --staged --quiet
          then
            echo "No changes to commit."
          else
            COMMIT_MESSAGE="($(date +'%Y-%m-%d %H:%M')) - $TOTAL_PROXIES total unique"
            echo "Creating commit with message: $COMMIT_MESSAGE"
            git commit -m "$COMMIT_MESSAGE"
            
            echo "Pushing changes to the repository..."
            git push
          fi

name: Check Proxies Availability

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-and-save:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # --- ШАГ 1: УСТАНОВКА SUBCONVERTER ---
      - name: Download and prepare subconverter
        run: |
          # 1. Скачиваем последнюю версию subconverter
          wget -O subconverter.tar.gz https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz
          # 2. Распаковываем архив
          tar -xvf subconverter.tar.gz
          # 3. Перемещаем исполняемый файл для удобства и делаем его исполняемым
          mv subconverter/subconverter .
          chmod +x subconverter

      # --- ШАГ 2: ПРОВЕРКА И СОХРАНЕНИЕ ---
      - name: Check proxies and save working ones
        run: |
          # subconverter работает с URL, а не с файлами, поэтому мы передаем ему URL напрямую
          # -g генерирует подписку, -u указывает URL для проверки, --speedtest проверяет скорость
          # stdout команды будет содержать рабочие прокси, которые мы перенаправляем в файл
          ./subconverter -g -u "https://raw.githubusercontent.com/F0rc3Run/F0rc3Run/refs/heads/main/Best-Results/proxies.txt" --speedtest 50 > public/checked-proxies.txt
        continue-on-error: true
        
      - name: Check if result file exists
        id: check_file
        run: |
          # Проверяем, что файл не пустой
          if [ -s public/checked-proxies.txt ]; then
            echo "file_exists=true" >> $GITHUB_OUTPUT
          else
            echo "No working proxies found. Skipping commit."
            echo "file_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push checked proxies
        if: steps.check_file.outputs.file_exists == 'true'
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Автоматическое обновление проверенных прокси"
          file_pattern: "public/checked-proxies.txt"

name: Check VLESS Proxies (Parallel, REALITY-only)

on:
  schedule:
    # Запускается каждый день в 00:00 по UTC (03:00 по Москве)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  # ЗАДАНИЕ 1: ПОДГОТОВКА И ФИЛЬТРАЦИЯ
  prepare:
    runs-on: ubuntu-latest
    outputs:
      job_matrix: ${{ steps.split.outputs.job_matrix }}
    steps:
      - name: Fetch, Filter, and Split Proxies
        id: split
        run: |
          curl -s https://raw.githubusercontent.com/ki1obyte/325234657545/refs/heads/main/test2.txt -o all_proxies.txt
          
          # Фильтруем ТОЛЬКО REALITY прокси с непустым pbk
          grep -E 'pbk=[^&]+|security=reality' all_proxies.txt > reality_proxies.txt || true
          
          # Устанавливаем желаемое количество параллельных заданий
          NUM_JOBS=1
          
          # Разделяем наш отфильтрованный файл на N частей
          split -d -n l/$NUM_JOBS reality_proxies.txt proxies_
          
          # Переименовываем файлы для удобства
          for i in $(seq 0 $((NUM_JOBS - 1))); do
            # Проверяем, существует ли файл, перед переименованием
            if [ -f "proxies_$(printf "%02d" $i)" ]; then
              mv "proxies_$(printf "%02d" $i)" "proxies_$i.txt"
            fi
          done
          
          # Генерируем JSON-массив [0, 1, ..., N-1] для матрицы
          JOB_MATRIX=$(jq -nc '[range(0; $num)]' --argjson num $NUM_JOBS)
          echo "job_matrix=$JOB_MATRIX" >> $GITHUB_OUTPUT

      - name: Upload proxy chunks
        uses: actions/upload-artifact@v4
        with:
          name: proxy-chunks
          path: proxies_*.txt

  # ЗАДАНИЕ 2: ПАРАЛЛЕЛЬНАЯ ПРОВЕРКА
  check:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        job_index: ${{ fromJson(needs.prepare.outputs.job_matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Get latest Xray version
        id: get_xray_version
        run: echo "XRAY_VERSION=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r .tag_name)" >> $GITHUB_ENV
      - name: Cache Xray binary
        id: cache-xray
        uses: actions/cache@v4
        with:
          path: xray
          key: ${{ runner.os }}-xray-core-${{ env.XRAY_VERSION }}
      - name: Install dependencies
        run: pip install requests PySocks
      - name: Download specific proxy chunk
        uses: actions/download-artifact@v4
        with:
          name: proxy-chunks
      
      # ИЗМЕНЕНИЕ: Передаем скрипту уникальное имя выходного файла
      - name: Run proxy check on chunk
        run: python check_proxies.py proxies_${{ matrix.job_index }}.txt results_${{ matrix.job_index }}.txt

      # ИЗМЕНЕНИЕ: Загружаем уникальный файл с результатами
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-batch-${{ matrix.job_index }}
          path: results_${{ matrix.job_index }}.txt

  # ЗАДАНИЕ 3: СБОРКА РЕЗУЛЬТАТОВ
  collect:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Download all result batches
        uses: actions/download-artifact@v4
        with:
          pattern: results-batch-*
          path: results
          # С этим исправлением опция merge-multiple становится неважной

      - name: Combine results and push to target repo
        run: |
          # --- ИСПРАВЛЕНИЕ ЗДЕСЬ ---
          # Включаем опцию globstar для работы **
          shopt -s globstar
          
          # Теперь эта команда будет работать правильно, заглядывая в подпапки
          cat results/**/*.txt > final_results.txt || true
          
          echo "Total working REALITY proxies found: $(wc -l < final_results.txt)"
          
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/ki1obyte/325234657545.git target_repo
          
          mv final_results.txt target_repo/test.txt
          
          cd target_repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add test.txt
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "$(date +'%Y-%m-%d %H:%M')"
            git push
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

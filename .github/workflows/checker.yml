name: Check VLESS Proxies (Parallel, REALITY-only, by Country)

on:
  schedule:
    - cron: "0 0 */2 * *"
  workflow_dispatch:

jobs:
  # ЗАДАНИЕ 1: ПОДГОТОВКА И ФИЛЬТРАЦИЯ
  prepare:
    runs-on: ubuntu-latest
    outputs:
      job_matrix: ${{ steps.split.outputs.job_matrix }}
    steps:
      - name: Fetch, Filter, and Split Proxies
        id: split
        run: |
          curl -s https://raw.githubusercontent.com/F0rc3Run/F0rc3Run/refs/heads/main/splitted-by-protocol/vless.txt -o all_proxies.txt
          grep -E 'pbk=[^&]+|security=reality' all_proxies.txt > reality_proxies.txt || true
          
          NUM_JOBS=15
          split -d -n l/$NUM_JOBS reality_proxies.txt proxies_
          
          for i in $(seq 0 $((NUM_JOBS - 1))); do
            if [ -f "proxies_$(printf "%02d" $i)" ]; then
              mv "proxies_$(printf "%02d" $i)" "proxies_$i.txt"
            fi
          done
          
          JOB_MATRIX=$(jq -nc '[range(0; $num)]' --argjson num $NUM_JOBS)
          echo "job_matrix=$JOB_MATRIX" >> $GITHUB_OUTPUT

      - name: Upload proxy chunks
        uses: actions/upload-artifact@v4
        with:
          name: proxy-chunks
          path: proxies_*.txt

  # ЗАДАНИЕ 2: ПАРАЛЛЕЛЬНАЯ ПРОВЕРКА
  check:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        job_index: ${{ fromJson(needs.prepare.outputs.job_matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Get latest Xray version
        id: get_xray_version
        run: echo "XRAY_VERSION=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r .tag_name)" >> $GITHUB_ENV
      - name: Cache Xray binary
        id: cache-xray
        uses: actions/cache@v4
        with:
          path: xray
          key: ${{ runner.os }}-xray-core-${{ env.XRAY_VERSION }}
      - name: Install dependencies
        run: pip install requests PySocks
      - name: Download specific proxy chunk
        uses: actions/download-artifact@v4
        with:
          name: proxy-chunks
      
      # --- ИЗМЕНЕНИЕ: Создаем папку для результатов и передаем ее в скрипт ---
      - name: Run proxy check on chunk
        run: |
          mkdir -p results_dir_${{ matrix.job_index }}
          python check_proxies.py proxies_${{ matrix.job_index }}.txt results_dir_${{ matrix.job_index }}

      # --- ИЗМЕНЕНИЕ: Загружаем папку с результатами, а не один файл ---
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-batch-${{ matrix.job_index }}
          path: results_dir_${{ matrix.job_index }}/

  # ЗАДАНИЕ 3: СБОРКА РЕЗУЛЬТАТОВ
  collect:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Download all result batches
        uses: actions/download-artifact@v4
        with:
          pattern: results-batch-*
          path: temp_results/

      - name: Combine results and push to target repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -e
          
          echo "Cloning target repository..."
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/ki1obyte/325234657545.git target_repo
          
          # 1. Подготовка директории для сортировки по странам
          TARGET_DIR="target_repo/splitted-by-country"
          echo "Preparing target directory: $TARGET_DIR"
          mkdir -p "$TARGET_DIR"
          rm -rf "$TARGET_DIR"/*
          
          # 2. Агрегация результатов по странам
          echo "Aggregating results by country..."
          find temp_results -type f -name "*.txt" | while read -r file; do
            filename=$(basename "$file")
            cat "$file" >> "$TARGET_DIR/$filename"
          done
          
          # --- ДОБАВЛЕНО: Создаем общий файл test.txt из всех отсортированных файлов ---
          echo "Creating combined test.txt file..."
          # Объединяем содержимое всех .txt файлов из папки по странам в один test.txt
          # `|| true` предотвратит ошибку, если ни одного рабочего прокси не будет найдено
          cat "$TARGET_DIR"/*.txt > target_repo/test.txt || true
          
          # 3. Подсчитываем общее количество, используя новый test.txt
          TOTAL_PROXIES=$(wc -l < target_repo/test.txt)
          echo "Total working REALITY proxies found: $TOTAL_PROXIES"
          
          # 4. Коммитим и отправляем изменения
          cd target_repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # --- ИЗМЕНЕНО: Добавляем в git и папку, и новый файл ---
          git add splitted-by-country/ test.txt
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            # Обновляем сообщение коммита для большей ясности
            git commit -m "($(date +'%Y-%m-%d %H:%M')) - $TOTAL_PROXIES total"
            echo "Pushing changes to the repository..."
            git push
          fi
          else
            # Более информативное сообщение коммита
            git commit -m "($(date +'%Y-%m-%d %H:%M')) - Found $TOTAL_PROXIES"
            echo "Pushing changes to the repository..."
            git push
          fi

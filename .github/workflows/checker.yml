name: Check VLESS Proxies

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Скачивание репозитория
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      # Шаг 2: Настройка Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      # --- НОВЫЙ ШАГ: Автоматическое определение последней версии Xray ---
      - name: Get latest Xray version
        id: get_xray_version
        run: |
          # Используем API GitHub, чтобы получить тег последнего релиза и записать его в переменную окружения
          echo "XRAY_VERSION=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | jq -r .tag_name)" >> $GITHUB_ENV
      
      # Шаг 3: Кэширование бинарного файла Xray с динамическим ключом
      - name: Cache Xray binary
        id: cache-xray
        uses: actions/cache@v4
        with:
          path: xray
          # Ключ теперь использует переменную, полученную на предыдущем шаге.
          # Кэш будет автоматически обновляться при выходе новой версии Xray.
          key: ${{ runner.os }}-xray-core-${{ env.XRAY_VERSION }}

      # Шаг 4: Установка зависимостей
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y unzip
          pip install requests PySocks

      # Шаг 5: Запуск скрипта проверки
      - name: Run proxy check
        run: python check_proxies.py

      # Шаг 6: Коммит и отправка изменений
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main
          git add working_vless.txt
          if git diff --staged --quiet; then
            echo "No changes to commit in working_vless.txt"
          else
            git commit -m "Updated working VLESS proxies: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
